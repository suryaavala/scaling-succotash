services:
  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: opensearch
    volumes:
      - ./data/opensearch:/usr/share/opensearch/data
    environment:
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx1024m"
      - OPENSEARCH_INITIAL_MB=512
      - OPENSEARCH_MAX_MB=1024
      - DISABLE_SECURITY_PLUGIN=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1536M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 30s

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: jaeger
    environment:
      - COLLECTOR_OTLP_ENABLED=true
    ports:
      - "16686:16686"
      - "4317:4317"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M

  gateway_api:
    build:
      context: .
      dockerfile: ./src/api/Dockerfile
    container_name: gateway_api
    environment:
      - PROFILING_ENABLED=true
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENSEARCH_URL=http://opensearch:9200
      - REDIS_URL=redis://redis:6379/0
      - INFERENCE_URL=http://inference_service:8001
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    depends_on:
      opensearch:
        condition: service_healthy
      redis:
        condition: service_healthy
      inference_service:
        condition: service_started

  inference_service:
    build:
      context: .
      dockerfile: ./src/inference/Dockerfile
    container_name: inference_service
    environment:
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
    ports:
      - "8001:8001"
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2048M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8001/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 60s

  celery_worker:
    build:
      context: .
      dockerfile: ./src/worker/Dockerfile
    container_name: celery_worker
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://redis:6379/0
      - OPENSEARCH_URL=http://opensearch:9200
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1024M
    depends_on:
      redis:
        condition: service_healthy
      opensearch:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: ./src/frontend/Dockerfile
    container_name: frontend
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://gateway_api:8000
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    depends_on:
      gateway_api:
        condition: service_healthy

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    container_name: opensearch-dashboards
    ports:
      - "5601:5601"
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch:9200"]'
      DISABLE_SECURITY_DASHBOARDS_PLUGIN: "true"
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    depends_on:
      opensearch:
        condition: service_healthy

  data_ingester:
    build:
      context: .
      dockerfile: ./src/worker/Dockerfile
    container_name: data_ingester
    profiles: ["ingest"]
    entrypoint: ["/usr/bin/dumb-init", "--"]
    command: ["/app/.venv/bin/python", "scripts/ingest_data.py", "--file", "data/${DATA_FILE:-companies.csv}", "--limit", "${LIMIT:-7000000}"]
    volumes:
      - ./data:/app/data
      - ./scripts:/app/scripts
    environment:
      - OPENSEARCH_URL=http://opensearch:9200
    depends_on:
      opensearch:
        condition: service_healthy
