repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: debug-statements
      - id: double-quote-string-fixer
      - id: name-tests-test
      - id: check-case-conflict
      - id: check-merge-conflict
      - id: check-json
      - id: check-toml
      - id: detect-aws-credentials
      - id: detect-private-key
      - id: check-added-large-files
        args:
        - maxkb: 100mB

  - repo: local
    hooks:
      - id: format
        name: format
        entry: make format
        language: system
        types: [python]
        pass_filenames: false
      - id: lint
        name: lint
        entry: make lint
        language: system
        type: [python]
        pass_filenames: false
      - id: typecheck
        name: typecheck
        entry: make typecheck
        language: system
        types: [python]
      - id: test-fast
        name: test-fast
        entry: make test-fast
        language: system
        types: [python]
        
        
